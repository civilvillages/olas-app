name: Build OLAS APK

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create android project files
        run: flutter create . --platforms=android

      - name: Ensure Android minSdk
        run: |
          f=android/app/build.gradle
          if [ -f "$f" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' "$f" || true
            sed -i 's/minSdk = .*/minSdk = 21/' "$f" || true
          fi
          g=android/app/build.gradle.kts
          if [ -f "$g" ]; then
            sed -i 's/minSdk = .*/minSdk = 21/' "$g" || true
          fi

      - name: Ensure INTERNET permission
        run: |
          m=android/app/src/main/AndroidManifest.xml
          if [ -f "$m" ]; then
            if ! grep -q 'android.permission.INTERNET' "$m"; then
              sed -i 's#\(<manifest[^>]*>\)#\1\n    <uses-permission android:name="android.permission.INTERNET"/>#' "$m"
              echo "INTERNET permission added"
            else
              echo "INTERNET permission already present"
            fi
            head -8 "$m"
          fi

      - name: Get packages
        run: flutter pub get

      - name: Build release APK (split per phone type -> smaller download)
        run: flutter build apk --release --split-per-abi

      - name: Pick the arm64 APK as the download (covers modern phones)
        run: |
          src=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if [ -f "$src" ]; then
            cp "$src" build/app/outputs/flutter-apk/app-release.apk
            echo "using arm64 build ($(du -h "$src" | cut -f1))"
          else
            echo "arm64 apk not found; falling back to universal"
            flutter build apk --release
          fi

      - name: Upload the APK (artifact backup)
        uses: actions/upload-artifact@v4
        with:
          name: olas-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish to the "latest" Release (stable phone download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: OLAS App (latest build)
          body: |
            Newest OLAS app build. Open this page on your phone and tap
            app-release.apk to install. Each push replaces it with the newest APK.
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
